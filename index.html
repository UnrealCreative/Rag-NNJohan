<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Johan v37.0: Loop-Breaker</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --accent: #bb86fc; --dark: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #d1d1d1; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: var(--dark); padding: 15px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #161616; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; }
        #heatmap { height: 120px; overflow-y: auto; background: #000; padding: 8px; border: 1px solid #333; font-family: monospace; font-size: 10px; color: var(--neon); }
        #log { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; background: #0a0a0a; }
        .msg { margin-bottom: 20px; padding: 15px; border-radius: 12px; max-width: 85%; line-height: 1.6; border: 1px solid #222; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; }
        .ai { background: #0d0d0d; color: var(--accent); align-self: flex-start; border-color: var(--accent); }
        #input-area { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; border-radius: 8px; outline: none; font-size: 16px; }
        button { background: var(--neon); color: #000; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0;">JOHAN v37</h2>
    <div class="panel">
        <span class="panel-label">Core Status</span>
        <div id="status" style="font-size: 11px; color: var(--neon);">SYNCING...</div>
    </div>
    <div class="panel">
        <span class="panel-label">Neural Heatmap</span>
        <div id="heatmap"></div>
    </div>
    <div class="panel">
        <span class="panel-label">System Policy</span>
        <div style="font-size: 9px; color: #666; line-height: 1.4;">
            1. Priority to King's Logic.<br>
            2. Eliminate Repetitive Loops.<br>
            3. Detailed Retrieval over Generic Response.
        </div>
    </div>
</div>

<div style="flex: 1; display: flex; flex-direction: column;">
    <div id="log"></div>
    <div id="input-area">
        <input type="text" id="user-in" placeholder="Query the Core..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">FIRE</button>
    </div>
</div>

<script>
    let kb = [];
    let weights = {};
    const sources = [
        "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt",
        "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt",
        "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt"
    ];

    async function sync() {
        kb = [];
        for (let url of sources) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                kb = [...kb, ...text.split(/\r?\n|\. /).filter(s => s.trim().length > 3)];
            } catch (e) { console.error("Source failed", url); }
        }
        document.getElementById('status').innerText = `READY: ${kb.length} NODES`;
    }

    function run() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        // FAILSAFE: Simple Greetings
        const low = input.toLowerCase();
        if (low === "hi" || low === "hello" || low === "hey") {
            addLog("Johan", "The system is online. What do you require, King?");
            return;
        }

        const query = low.replace(/what is /g, "").replace(/who is /g, "").replace(/a /g, "").trim();
        let matches = kb.filter(s => s.toLowerCase().includes(query));

        if (matches.length > 0) {
            weights = {};
            matches.forEach(s => {
                let tokens = s.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(t => t);
                for (let i = 0; i < tokens.length - 1; i++) {
                    if (!weights[tokens[i]]) weights[tokens[i]] = {};
                    weights[tokens[i]][tokens[i+1]] = (weights[tokens[i]][tokens[i+1]] || 0) + 1;
                }
            });

            let seed = Object.keys(weights).find(w => w.includes(query)) || Object.keys(weights)[0];
            addLog("Johan", generate(seed));
            updateHeatmap();
        } else {
            addLog("Johan", `Neural path for '${query}' not found. Provide more data to the GitHub.`);
        }
    }

    function generate(seed) {
        let current = seed;
        let res = [current];
        let history = [current]; // Keep track to prevent loops

        for (let i = 0; i < 60; i++) {
            let nexts = weights[current];
            if (!nexts) break;

            // Sort potential next words by frequency
            let sorted = Object.keys(nexts).sort((a, b) => nexts[b] - nexts[a]);
            
            // LOOP BREAKER: If the top choice is already in recent history, pick the second choice
            let next = sorted[0];
            if (history.slice(-4).includes(next) && sorted.length > 1) {
                next = sorted[1]; 
            }

            res.push(next);
            history.push(next);
            if (".!?".includes(next)) break;
            current = next;
        }
        return res.join(" ").replace(/\s+([.!?])/g, "$1").charAt(0).toUpperCase() + res.join(" ").slice(1);
    }

    function updateHeatmap() {
        const h = document.getElementById('heatmap');
        h.innerHTML = Object.keys(weights).slice(0, 15).map(k => `<div>${k} → ${Object.keys(weights[k])[0]}</div>`).join("");
    }

    function addLog(s, t) {
        const l = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        d.innerHTML = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    window.onload = sync;
</script>
</body>
</html>
