<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JOHAN v38: Neural Lab</title>
    <style>
        :root { --neon: #00ffcc; --accent: #bb86fc; --bg: #050505; --panel: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ddd; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar: The Neural Map & Controls */
        #sidebar { width: 400px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .map-container { flex: 1; overflow-y: auto; background: #000; border: 1px solid #222; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; }
        .node-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .snip-btn { color: #ff4444; cursor: pointer; font-weight: bold; margin-left: 10px; }
        
        /* Main: Chat & Evolution */
        #main { flex: 1; display: flex; flex-direction: column; background: #080808; }
        #log { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 10px; max-width: 80%; border: 1px solid #333; position: relative; }
        .ai { color: var(--accent); align-self: flex-start; border-color: var(--accent); }
        .user { color: var(--neon); align-self: flex-end; border-color: var(--neon); }
        
        .controls { padding: 10px; display: flex; gap: 10px; background: #111; border-radius: 8px; margin-top: 10px; }
        .btn-sm { font-size: 10px; padding: 5px 10px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
        .btn-reward { border-color: var(--neon); color: var(--neon); }

        #input-area { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: var(--neon); padding: 15px; border-radius: 8px; outline: none; }
        button#send { background: var(--neon); color: #000; font-weight: bold; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0;">NEURAL MAP</h2>
    <div id="status" style="font-size: 10px; color: #888;">Nodes Active: 0</div>
    
    <div class="map-container" id="map-view">
        </div>

    <div class="panel" style="background: #1a1a1a; padding: 10px; border-radius: 8px;">
        <span style="font-size: 10px; color: #888;">EVOLVE MEMORY</span>
        <input type="text" id="evolve-in" placeholder="Inject new logic string..." style="width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 12px; padding: 5px;">
        <button class="btn-sm" onclick="evolveBrain()" style="width: 100%; margin-top: 5px; background: var(--accent);">INJECT</button>
    </div>
</div>

<div id="main">
    <div id="log"></div>
    <div id="input-area">
        <input type="text" id="user-in" placeholder="Interact with Johan..." onkeypress="if(event.key==='Enter') execute()">
        <button id="send" onclick="execute()">RUN</button>
    </div>
</div>

<script>
    let brain = {}; // The Neural Network (Word -> {NextWord: Weight})
    let lastResponseTokens = [];

    // 1. INITIAL LEARNING (The "Fetch")
    async function sync() {
        const sources = [
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt",
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt",
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt"
        ];
        for (let url of sources) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                learn(text);
            } catch (e) { console.error("Sync Error"); }
        }
        renderMap();
    }

    function learn(text) {
        const lines = text.split(/\r?\n|\. /);
        lines.forEach(line => {
            const tokens = line.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(t => t.length > 0);
            for (let i = 0; i < tokens.length - 1; i++) {
                const a = tokens[i];
                const b = tokens[i+1];
                if (!brain[a]) brain[a] = {};
                brain[a][b] = (brain[a][b] || 0) + 1;
            }
        });
        document.getElementById('status').innerText = `Nodes Active: ${Object.keys(brain).length}`;
    }

    function execute() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        const query = input.toLowerCase().replace(/what is /g, "").trim();
        const startToken = Object.keys(brain).find(k => k.includes(query)) || Object.keys(brain)[0];
        
        const response = generate(startToken);
        addLog("Johan", response, true);
    }

    function generate(seed) {
        let current = seed;
        let result = [current];
        lastResponseTokens = [current];

        for (let i = 0; i < 50; i++) {
            let options = brain[current];
            if (!options) break;

            let sorted = Object.keys(options).sort((a, b) => options[b] - options[a]);
            let next = sorted[0];

            // Loop Prevention
            if (result.slice(-3).includes(next) && sorted.length > 1) next = sorted[1];

            result.push(next);
            lastResponseTokens.push(next);
            if (".!?".includes(next)) break;
            current = next;
        }
        return result.join(" ").replace(/\s+([.!?])/g, "$1");
    }

    // 2. REWARD SYSTEM
    function reward() {
        for (let i = 0; i < lastResponseTokens.length - 1; i++) {
            const a = lastResponseTokens[i];
            const b = lastResponseTokens[i+1];
            brain[a][b] += 5; // Boost weight
        }
        renderMap();
        alert("Path Reinforced.");
    }

    // 3. SNIPPING LOGIC
    function snip(a, b) {
        if (brain[a] && brain[a][b]) {
            delete brain[a][b];
            renderMap();
        }
    }

    function evolveBrain() {
        const str = document.getElementById('evolve-in').value;
        if (str) {
            learn(str);
            document.getElementById('evolve-in').value = "";
            renderMap();
        }
    }

    function renderMap() {
        const view = document.getElementById('map-view');
        view.innerHTML = "";
        const keys = Object.keys(brain).slice(0, 50); // Show top 50 nodes
        keys.forEach(a => {
            const targets = brain[a];
            Object.keys(targets).forEach(b => {
                const row = document.createElement('div');
                row.className = "node-row";
                row.innerHTML = `<span>${a} → ${b} (${targets[b]})</span><span class="snip-btn" onclick="snip('${a}','${b}')">✂</span>`;
                view.appendChild(row);
            });
        });
    }

    function addLog(s, t, isAI = false) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        let html = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        if (isAI) {
            html += `<div class="controls"><button class="btn-sm btn-reward" onclick="reward()">REWARD</button></div>`;
        }
        d.innerHTML = html;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    window.onload = sync;
</script>
</body>
</html>
