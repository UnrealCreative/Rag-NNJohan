<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Johan v32.1: Aggressive Generalizer</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --text: #d1d1d1; --accent: #bb86fc; --dark: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: var(--dark); padding: 15px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #161616; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        select { width: 100%; background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 10px; border-radius: 5px; cursor: pointer; font-family: monospace; }
        #status { font-size: 11px; color: var(--neon); margin-top: 8px; font-family: monospace; }
        #log { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 85%; line-height: 1.5; border: 1px solid #333; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; border-color: var(--neon); }
        .ai { background: #0d0d0d; color: var(--accent); align-self: flex-start; border-color: var(--accent); font-weight: 500; }
        .sys { font-size: 10px; color: #555; text-align: center; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        #chat { flex: 1; display: flex; flex-direction: column; padding: 25px; background: #0a0a0a; }
        input { background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; border-bottom: 2px solid var(--neon); }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 12px; background: var(--neon); color: #000; transition: 0.2s; }
        button:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0; letter-spacing: 2px;">JOHAN v32</h2>
    <div class="panel">
        <span class="panel-label">Uplink Source</span>
        <select id="source-selector" onchange="fetchGitHub()">
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt">MAIN DATA</option>
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt">LINGUISTICS/NEWS</option>
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt">HISTORY/EXPANSION</option>
        </select>
        <div id="status">INITIATING...</div>
    </div>
    <div class="panel" style="flex: 1; overflow-y: auto;">
        <span class="panel-label">Active Knowledge Stream</span>
        <div id="knowledge-preview" style="font-size: 10px; color: #444; font-family: monospace;"></div>
    </div>
</div>

<div id="chat">
    <div id="log"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="user-in" placeholder="Query the database..." onkeypress="if(event.key==='Enter') processQuery()">
        <button onclick="processQuery()" style="padding: 0 40px;">RUN</button>
    </div>
</div>

<script>
    let knowledgeBase = [];

    async function fetchGitHub() {
        const url = document.getElementById('source-selector').value;
        const status = document.getElementById('status');
        status.innerText = "SYNCING CLOUD...";
        try {
            const res = await fetch(url);
            const text = await res.text();
            // Split by lines or periods, clean up whitespace
            knowledgeBase = text.split(/\r?\n|\. /).map(s => s.trim()).filter(s => s.length > 5);
            document.getElementById('knowledge-preview').innerText = knowledgeBase.slice(0, 20).join("\n\n");
            status.innerText = "ONLINE - SOURCE CONNECTED";
            addLog("System", "Neural links updated to current source.");
        } catch (e) {
            status.innerText = "CONNECTION FAILED";
        }
    }

function processQuery() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        // Filter out "what is", "who is", etc. to find the CORE topic
        const cleanQuery = input.toLowerCase()
            .replace(/what is a /g, "").replace(/what is /g, "")
            .replace(/who is /g, "").replace(/tell me about /g, "");
        
        const queryWords = cleanQuery.split(/\s+/).filter(w => w.length > 2);
        let results = [];

        // SCAN: Grab matches but prioritize sentences where the word appears early
        knowledgeBase.forEach(sentence => {
            let matchCount = 0;
            queryWords.forEach(word => {
                if (sentence.toLowerCase().includes(word)) matchCount++;
            });
            
            if (matchCount > 0) {
                results.push({ text: sentence, score: matchCount });
            }
        });

        // SORT & LIMIT: Show the top 5 most relevant sentences so it stays readable
        if (results.length > 0) {
            results.sort((a, b) => b.score - a.score);
            let topMatches = results.slice(0, 5).map(r => r.text);
            
            // Join them and clean up the "echo" loops
            let fullResponse = topMatches.join(". ").replace(/\.\./g, ".");
            addLog("Johan", fullResponse);
        } else {
            addLog("Johan", "I have no data on '" + cleanQuery + "' in this uplink, King.");
        }
    }

    function addLog(s, t) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        if (s === "System") d.className = "sys";
        d.innerHTML = s === "System" ? t : `<strong>${s.toUpperCase()}</strong><br>${t}`;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    window.onload = fetchGitHub;
</script>
</body>
</html>
