<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Johan v36.0: Unified Neural Command</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --accent: #bb86fc; --dark: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #d1d1d1; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 350px; background: var(--dark); padding: 15px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #161616; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        
        #heatmap { height: 150px; overflow-y: auto; background: #000; padding: 8px; border: 1px solid #333; font-family: monospace; font-size: 10px; color: #666; }
        #status-display { font-size: 11px; color: var(--neon); font-family: monospace; }
        
        #log { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; background: #0a0a0a; }
        .msg { margin-bottom: 20px; padding: 15px; border-radius: 12px; max-width: 85%; line-height: 1.6; border: 1px solid #222; position: relative; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; border-color: #333; }
        .ai { background: #0d0d0d; color: var(--accent); align-self: flex-start; border-color: var(--accent); box-shadow: 0 0 10px rgba(187, 134, 252, 0.1); }
        
        #input-area { padding: 25px; background: #111; display: flex; gap: 15px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; color: var(--neon); border: 1px solid #333; padding: 18px; border-radius: 10px; outline: none; font-size: 16px; border-bottom: 2px solid var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 0 40px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px var(--neon); transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0; letter-spacing: 3px;">JOHAN v36</h2>
    
    <div class="panel">
        <span class="panel-label">Global Neural Sync</span>
        <div id="status-display">INITIALIZING CORE...</div>
        <button onclick="syncAll()" style="width:100%; margin-top:10px; padding: 5px; font-size: 10px;">FORCE GLOBAL RE-SYNC</button>
    </div>

    <div class="panel">
        <span class="panel-label">Neural Heatmap</span>
        <div id="heatmap">Awaiting query...</div>
    </div>

    <div class="panel" style="flex: 1; overflow-y: auto;">
        <span class="panel-label">Merged Knowledge Core</span>
        <div id="core-preview" style="font-size: 9px; color: #444; font-family: monospace; white-space: pre-wrap;"></div>
    </div>
</div>

<div style="flex: 1; display: flex; flex-direction: column;">
    <div id="log"></div>
    <div id="input-area">
        <input type="text" id="user-in" placeholder="Execute command, King..." onkeypress="if(event.key==='Enter') runLogic()">
        <button onclick="runLogic()">EXECUTE</button>
    </div>
</div>

<script>
    let globalKnowledge = [];
    let brainWeights = {};
    const sources = [
        "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt",
        "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt",
        "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt"
    ];

    async function syncAll() {
        const status = document.getElementById('status-display');
        const preview = document.getElementById('core-preview');
        status.innerText = "⚡ MERGING DATABASES...";
        globalKnowledge = [];

        try {
            for (let url of sources) {
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n|\. /).filter(s => s.trim().length > 5);
                globalKnowledge = [...globalKnowledge, ...lines];
            }
            status.innerText = `✅ SYNCED: ${globalKnowledge.length} NEURAL NODES`;
            preview.innerText = globalKnowledge.slice(0, 30).join("\n\n");
        } catch (e) {
            status.innerText = "❌ SYNC FAILURE";
        }
    }

    function runLogic() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        const query = input.toLowerCase().replace(/what is a /g, "").replace(/what is /g, "").replace(/who is /g, "").trim();
        
        // 1. SELECTIVE RETRIEVAL (RAG)
        let relevantData = globalKnowledge.filter(s => s.toLowerCase().includes(query));

        if (relevantData.length > 0) {
            // 2. NEURAL TRAINING (NN)
            brainWeights = {};
            relevantData.forEach(sentence => {
                let tokens = sentence.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(t => t);
                for (let i = 0; i < tokens.length - 1; i++) {
                    if (!brainWeights[tokens[i]]) brainWeights[tokens[i]] = {};
                    brainWeights[tokens[i]][tokens[i+1]] = (brainWeights[tokens[i]][tokens[i+1]] || 0) + 1;
                }
            });

            updateHeatmap();

            // 3. GENERATION WITH SEED
            let startSeed = Object.keys(brainWeights).find(w => w.includes(query)) || Object.keys(brainWeights)[0];
            let response = generateNeuralResponse(startSeed);
            addLog("Johan", response);
        } else {
            addLog("Johan", "That query does not exist in the merged core, King.");
        }
    }

    function generateNeuralResponse(seed) {
        let current = seed;
        let result = [current];
        let maxTokens = 100; // Pushing the stopping point further

        for (let i = 0; i < maxTokens; i++) {
            let options = brainWeights[current];
            if (!options) break;

            // Neural Prediction
            let next = Object.keys(options).reduce((a, b) => options[a] > options[b] ? a : b);
            result.push(next);

            if (".!?".includes(next) && i > 15) break; // Don't stop too early
            current = next;
        }

        let output = result.join(" ").replace(/\s+([.!?])/g, "$1");
        return output.charAt(0).toUpperCase() + output.slice(1);
    }

    function updateHeatmap() {
        const h = document.getElementById('heatmap');
        h.innerHTML = "";
        let entries = Object.entries(brainWeights).slice(0, 20);
        entries.forEach(([key, val]) => {
            let next = Object.keys(val)[0];
            h.innerHTML += `<div>${key} → ${next} (${Object.values(val)[0]})</div>`;
        });
    }

    function addLog(s, t) {
        const l = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        d.innerHTML = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        l.appendChild(d);
        l.scrollTop = l.scrollHeight;
    }

    window.onload = syncAll;
</script>
</body>
</html>
