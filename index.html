<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JOHAN v41.0: The Unified Soul</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --text: #d1d1d1; --accent: #bb86fc; --dark: #111; --good: #28a745; --bad: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 450px; background: var(--dark); padding: 15px; border-right: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #161616; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        
        #heatmap { height: 300px; overflow-y: auto; background: #000; padding: 8px; border: 1px solid #333; font-family: monospace; font-size: 11px; color: #aaa; }
        #change-log { height: 80px; overflow-y: auto; background: #080808; font-size: 10px; color: var(--accent); padding: 5px; border: 1px solid #222; }
        
        #chat { flex: 1; display: flex; flex-direction: column; padding: 25px; background: #0a0a0a; }
        #log { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 85%; line-height: 1.4; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; border: 1px solid #333; }
        .ai { background: #121212; color: var(--accent); align-self: flex-start; border: 1px solid #333; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        input { background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 10px; transition: 0.2s; }
        .btn-fire { background: var(--neon); color: black; padding: 0 30px; }
        .btn-reward { background: var(--good); color: white; flex: 1; }
        .btn-punish { background: var(--bad); color: white; flex: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0;">🧠 JOHAN v41.0</h2>

    <div class="panel">
        <span class="panel-label">🔧 Active Source Sync</span>
        <div id="sync-status" style="font-size: 11px; color: var(--neon);">CONNECTING TO GITHUB...</div>
    </div>

    <div class="panel">
        <span class="panel-label">📈 Brain Activity (Heatmap)</span>
        <div id="heatmap">Ready for data...</div>
    </div>

    <div class="panel">
        <span class="panel-label">📜 System Logs</span>
        <div id="change-log">Evolution Online.</div>
    </div>

    <div class="panel" style="display:flex; gap: 5px;">
        <button onclick="exportBrain()" style="background:#333; color:white; font-size: 10px; flex:1;">EXPORT</button>
        <button onclick="importBrain()" style="background:#333; color:white; font-size: 10px; flex:1;">IMPORT</button>
        <button onclick="syncGlobal()" style="background:var(--accent); color:black; font-size: 10px; flex:1;">FORCE SYNC</button>
    </div>
</div>

<div id="chat">
    <div id="log"></div>
    <div class="controls">
        <button class="btn-reward" onclick="adjustWeight(2.5)">✅ REWARD</button>
        <button class="btn-punish" onclick="adjustWeight(0.4)">❌ PUNISH</button>
    </div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="user-in" placeholder="Command your creation, King..." onkeypress="if(event.key==='Enter') generate()">
        <button class="btn-fire" onclick="generate()">FIRE</button>
    </div>
</div>

<script>
    window.brainWeights = {};
    window.lastPath = [];
    const temperature = 0.85;

    // v27 Identity Core
    const coreIdentity = [
        "Who is King? King is my creator and the man with the mustache.",
        "Who is your creator? King is my creator.",
        "What is your name? My name is Johan.",
        "Hello. Hello King, I am ready to serve you."
    ];

    async function syncGlobal() {
        const urls = [
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt",
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt",
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt"
        ];
        
        logSystem("Syncing Global Repositories...");
        bulkLearn(coreIdentity); // Ensure identity is priority

        for (let url of urls) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n|\. /).filter(l => l.trim().length > 3);
                bulkLearn(lines);
            } catch (e) { logSystem("Sync Error on " + url); }
        }
        document.getElementById('sync-status').innerText = "GLOBAL CORES SYNCED";
    }

    function bulkLearn(data) {
        data.forEach(text => {
            let tokens = text.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(w => w);
            // v27 Variable-Size Context Logic (1 to 5 tokens)
            for (let n = 1; n <= 5; n++) {
                for (let i = 0; i <= tokens.length - n; i++) {
                    let ctx = tokens.slice(i, i + n).join("_");
                    let next = tokens[i + n];
                    if (next) {
                        if (!window.brainWeights[ctx]) window.brainWeights[ctx] = {};
                        window.brainWeights[ctx][next] = (window.brainWeights[ctx][next] || 0) + 10;
                    }
                }
            }
        });
        updateHeatmap();
    }

function generate() {
        let inputStr = document.getElementById('user-in').value.toLowerCase().trim();
        if(!inputStr) return;
        addLog("User", inputStr);
        document.getElementById('user-in').value = "";
        
        let tokens = inputStr.replace(/([.!?])/g, " $1 ").split(/\s+/).filter(w => w);
        let res = [];
        let memory = tokens.slice(-5);
        
        // --- NEW: RAG ANCHOR LOGIC ---
        // We find the 'best fit' sentence from the raw data to prime the pump
        let bestMatch = "";
        const allData = Object.keys(window.brainWeights); // Simplified check
        
        for (let i = 0; i < 50; i++) {
            let picked = null;
            
            // Look for the longest possible match in weights (5-word window)
            for (let size = Math.min(memory.length, 5); size >= 1; size--) {
                let key = memory.slice(-size).join("_");
                let options = window.brainWeights[key] || {};
                
                // RAG BOOST: If the word exists in the same context as the user's input,
                // we give it a 100x multiplier so he stays 'on topic'.
                let choices = Object.keys(options);
                if (choices.length > 0) {
                    let total = 0;
                    let weighted = choices.map(word => {
                        let weight = options[word];
                        // If this word appeared near the user's query in the source text, boost it
                        if (inputStr.includes(word)) weight *= 10; 
                        
                        let w = Math.pow(weight, 1 / temperature);
                        total += w; return { word, w };
                    });
                    
                    let r = Math.random() * total;
                    let s = 0;
                    for (let item of weighted) {
                        s += item.w;
                        if (r <= s) { picked = item.word; break; }
                    }
                }
                if (picked) break;
            }

            if (picked) {
                res.push(picked);
                if (".!?".includes(picked)) break;
                memory.push(picked);
                if (memory.length > 5) memory.shift();
            } else break;
        }

        let out = res.join(" ").replace(/\s+([.!?])/g, "$1");
        addLog("Johan", out.charAt(0).toUpperCase() + out.slice(1));
    }

    function adjustWeight(mult) {
        window.lastPath.forEach(step => {
            if(window.brainWeights[step.ctx]) window.brainWeights[step.ctx][step.word] *= mult;
        });
        logSystem("Neural feedback: x" + mult);
        updateHeatmap();
    }

    function logSystem(m) {
        document.getElementById('change-log').innerHTML = `<div>> ${m}</div>` + document.getElementById('change-log').innerHTML;
    }

    function addLog(s, t) {
        let l = document.getElementById('log');
        let d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        d.innerHTML = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function updateHeatmap() {
        let h = document.getElementById('heatmap'); h.innerHTML = "";
        let keys = Object.keys(window.brainWeights).slice(-60);
        keys.forEach(k => {
            for(let n in window.brainWeights[k]) h.innerHTML += `<div>${k.replace(/_/g,' ')} <span style="color:var(--neon)">→</span> ${n} (${Math.round(window.brainWeights[k][n])})</div>`;
        });
    }

    function exportBrain() { prompt("Data:", JSON.stringify(window.brainWeights)); }
    function importBrain() { let d = prompt("Paste:"); if(d) { window.brainWeights = JSON.parse(d); updateHeatmap(); } }

    window.onload = syncGlobal;
</script>
</body>
</html>
