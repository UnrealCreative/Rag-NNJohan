<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Johan v31.0: Multi-Source</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --text: #d1d1d1; --accent: #bb86fc; --dark: #111; --panel: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 380px; background: var(--dark); padding: 15px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: var(--panel); padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        
        /* Dropdown Styling */
        select { 
            width: 100%; background: #000; color: var(--neon); border: 1px solid var(--neon); 
            padding: 10px; border-radius: 5px; outline: none; cursor: pointer; font-family: monospace;
        }
        
        #status { font-size: 12px; color: var(--neon); margin-top: 5px; }
        #log { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 85%; line-height: 1.4; border: 1px solid #333; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; border-color: var(--neon); }
        .ai { background: #121212; color: var(--accent); align-self: flex-start; border-color: var(--accent); }
        
        #chat { flex: 1; display: flex; flex-direction: column; padding: 25px; background: #0a0a0a; }
        input { background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 12px; background: var(--neon); color: #000; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0;">🧠 JOHAN v31</h2>
    
    <div class="panel">
        <span class="panel-label">Select Knowledge Source</span>
        <select id="source-selector" onchange="fetchGitHub()">
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt">MAIN.TXT (Original)</option>
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt">NEW.TXT (Linguistics/History)</option>
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt">NEW1.TXT (Expanding...)</option>
        </select>
        <div id="status">📡 System Standing By</div>
    </div>

    <div class="panel" style="flex: 1; overflow-y: auto;">
        <span class="panel-label">Data Preview</span>
        <div id="knowledge-preview" style="font-size: 10px; color: #666; line-height: 1.6;">Select a source to view data...</div>
    </div>
</div>

<div id="chat">
    <div id="log"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="user-in" placeholder="Ask your creation, King..." onkeypress="if(event.key==='Enter') processQuery()">
        <button onclick="processQuery()" style="padding: 0 40px;">FIRE</button>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let brainWeights = {};

    async function fetchGitHub() {
        const url = document.getElementById('source-selector').value;
        const status = document.getElementById('status');
        const preview = document.getElementById('knowledge-preview');
        
        status.innerText = "🔄 Fetching Cloud Data...";
        status.style.color = "orange";

        try {
            const res = await fetch(url);
            const text = await res.text();
            
            // Clean split logic: handles both punctuation and tables better
            knowledgeBase = text.split(/[.\n]/).map(s => s.trim()).filter(s => s.length > 5);
            
            preview.innerText = "• " + knowledgeBase.slice(0, 15).join("\n• ");
            status.innerText = "✅ Source Synced Successfully";
            status.style.color = "var(--neon)";
            
            addLog("System", "Johan has switched his focus to the new source.");
        } catch (e) {
            status.innerText = "❌ Fetch Error";
            status.style.color = "red";
        }
    }

    function processQuery() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        // Reset the N-gram brain for the new response
        brainWeights = {};
        
        // BETTER SEARCH LOGIC (Scans for word overlap)
        const queryWords = input.toLowerCase().split(/\s+/).filter(w => w.length > 2);
        let bestMatch = "";
        let highestScore = 0;

        knowledgeBase.forEach(sentence => {
            let score = 0;
            queryWords.forEach(word => {
                if (sentence.toLowerCase().includes(word)) score += 10;
            });
            if (score > highestScore) {
                highestScore = score;
                bestMatch = sentence;
            }
        });

        if (bestMatch && highestScore > 0) {
            trainJohan([bestMatch]);
            const response = generateResponse();
            addLog("Johan", response);
        } else {
            addLog("Johan", "I cannot find a logical link to that in the current source, King.");
        }
    }

    function trainJohan(sentences) {
        sentences.forEach(s => {
            const tokens = s.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(w => w);
            for (let i = 0; i < tokens.length - 1; i++) {
                const ctx = tokens[i];
                const next = tokens[i+1];
                if (!brainWeights[ctx]) brainWeights[ctx] = {};
                brainWeights[ctx][next] = (brainWeights[ctx][next] || 0) + 1;
            }
        });
    }

    function generateResponse() {
        // Start from the very first word in our temporary brain
        let currentWord = Object.keys(brainWeights)[0];
        let result = [currentWord];
        
        for (let i = 0; i < 40; i++) {
            const options = brainWeights[currentWord];
            if (!options) break;
            
            // Pick most likely word (Greedy search for accuracy)
            const next = Object.keys(options).reduce((a, b) => options[a] > options[b] ? a : b);
            result.push(next);
            
            if (".!?".includes(next)) break;
            currentWord = next;
        }
        
        let final = result.join(" ").replace(/\s+([.!?])/g, "$1");
        return final.charAt(0).toUpperCase() + final.slice(1);
    }

    function addLog(s, t) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        d.innerHTML = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    // Initialize on first load
    window.onload = fetchGitHub;
</script>
</body>
</html>
