<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Johan v29.0: GitHub Auto-Hybrid</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --text: #d1d1d1; --accent: #bb86fc; --dark: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 400px; background: var(--dark); padding: 15px; border-right: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #161616; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        #status-light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #555; margin-right: 5px; }
        textarea { width: 100%; height: 120px; background: #000; color: var(--neon); border: 1px solid #444; padding: 10px; font-family: monospace; font-size: 11px; box-sizing: border-box; }
        #heatmap { height: 200px; overflow-y: auto; background: #000; padding: 8px; border: 1px solid #333; font-family: monospace; font-size: 11px; color: #aaa; }
        #chat { flex: 1; display: flex; flex-direction: column; padding: 25px; background: #0a0a0a; }
        #log { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 85%; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; border: 1px solid #333; }
        .ai { background: #121212; color: var(--accent); align-self: flex-start; border: 1px solid #333; font-weight: 500; }
        input { background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 10px; background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0;">🧠 JOHAN v29.0</h2>
    
    <div class="panel">
        <span class="panel-label">🌐 Cloud Status</span>
        <div style="font-size: 12px;"><span id="status-light"></span> <span id="status-text">Disconnected</span></div>
        <button onclick="fetchFromGitHub()" style="width: 100%; margin-top: 10px; font-size: 10px;">FORCE CLOUD SYNC</button>
    </div>

    <div class="panel">
        <span class="panel-label">📜 GENai Local Cache</span>
        <textarea id="data-input" placeholder="GitHub data will appear here..."></textarea>
    </div>

    <div class="panel">
        <span class="panel-label">📈 Logic Heatmap</span>
        <div id="heatmap">...</div>
    </div>
</div>

<div id="chat">
    <div id="log"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="user-in" placeholder="Talk to the Cloud, King..." onkeypress="if(event.key==='Enter') generate()">
        <button onclick="generate()" style="padding: 0 40px;">FIRE</button>
    </div>
</div>

<script>
    window.brainWeights = {};
    window.knowledgeBase = [];
    const temperature = 0.8;
    const GITHUB_URL = "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt";

    // 1. AUTOMATIC CLOUD FETCH
    async function fetchFromGitHub() {
        const statusLight = document.getElementById('status-light');
        const statusText = document.getElementById('status-text');
        statusLight.style.background = "orange";
        statusText.innerText = "Syncing with King's GitHub...";

        try {
            const response = await fetch(GITHUB_URL);
            if (!response.ok) throw new Error("Connection failed");
            const rawData = await response.text();
            
            document.getElementById('data-input').value = rawData;
            
            // Sync GENai (RAG)
            window.knowledgeBase = rawData.split(/[.\n]/).filter(s => s.trim().length > 10);
            
            // Sync Johan (Markov)
            bulkLearn(window.knowledgeBase);

            statusLight.style.background = "var(--neon)";
            statusText.innerText = "GitHub Connected & Trained";
            addLog("System", "Cloud data integrated successfully.");
        } catch (e) {
            statusLight.style.background = "red";
            statusText.innerText = "Offline Mode";
            addLog("System", "Could not reach GitHub. Using local identity.");
            bulkLearn(["Who is King? King is my creator.", "Who are you? I am Johan."]);
        }
    }

    function bulkLearn(data) {
        data.forEach(text => {
            let tokens = text.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(w => w);
            for (let n = 1; n <= 4; n++) {
                for (let i = 0; i <= tokens.length - n; i++) {
                    let ctx = tokens.slice(i, i + n).join("_");
                    let next = tokens[i + n];
                    if (next) {
                        if (!window.brainWeights[ctx]) window.brainWeights[ctx] = {};
                        window.brainWeights[ctx][next] = (window.brainWeights[ctx][next] || 0) + 10;
                    }
                }
            }
        });
        updateHeatmap();
    }

    function generate() {
        let input = document.getElementById('user-in').value.toLowerCase().trim();
        if(!input) return;
        addLog("User", input);

        // GENai RAG Search
        let queryWords = input.replace(/[^\w\s]/g, "").split(/\s+/).filter(w => w.length > 2);
        let relevant = [];
        window.knowledgeBase.forEach(fact => {
            queryWords.forEach(word => { if (fact.toLowerCase().includes(word)) relevant.push(fact); });
        });

        // Instant Learning
        if (relevant.length > 0) bulkLearn(relevant);

        // Johan Response
        let tokens = input.replace(/([.!?])/g, " $1 ").split(/\s+/).filter(w => w);
        let res = [];
        let memory = tokens.slice(-4);

        for (let i = 0; i < 20; i++) {
            let picked = null;
            for (let size = Math.min(memory.length, 4); size >= 1; size--) {
                let key = memory.slice(-size).join("_");
                let options = window.brainWeights[key] || {};
                let choices = Object.keys(options);
                if (choices.length > 0) {
                    let total = 0;
                    let weighted = choices.map(word => {
                        let w = Math.pow(options[word], 1 / temperature);
                        total += w; return { word, w };
                    });
                    let r = Math.random() * total;
                    let s = 0;
                    for (let item of weighted) {
                        s += item.w;
                        if (r <= s) { picked = item.word; break; }
                    }
                }
                if (picked) break;
            }
            if (picked) {
                res.push(picked);
                if (".!?".includes(picked)) break;
                memory.push(picked);
                if (memory.length > 4) memory.shift();
            } else break;
        }

        let out = res.join(" ").replace(/\s+([.!?])/g, "$1");
        addLog("Johan", out.charAt(0).toUpperCase() + out.slice(1) || "I am processing the GitHub data...");
        document.getElementById('user-in').value = "";
        updateHeatmap();
    }

    function addLog(s, t) {
        let l = document.getElementById('log');
        let d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        d.innerHTML = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function updateHeatmap() {
        let h = document.getElementById('heatmap'); h.innerHTML = "";
        Object.keys(window.brainWeights).slice(-30).forEach(k => {
            for(let n in window.brainWeights[k]) h.innerHTML += `<div>${k.replace(/_/g,' ')} → ${n}</div>`;
        });
    }

    // AUTO-START
    window.onload = fetchFromGitHub;
</script>
</body>
</html>
