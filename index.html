<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Johan v35.0: Neural-Hybrid</title>
    <style>
        :root { --bg: #050505; --neon: #00ffcc; --accent: #bb86fc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #d1d1d1; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: #111; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #161616; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .panel-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; }
        select { width: 100%; background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 8px; border-radius: 4px; margin-top: 5px; }
        #log { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; background: #0a0a0a; }
        .msg { margin-bottom: 18px; padding: 14px; border-radius: 10px; max-width: 80%; line-height: 1.6; border: 1px solid #222; }
        .user { background: #1a1a1a; color: var(--neon); align-self: flex-end; border-color: #333; }
        .ai { background: #0d0d0d; color: var(--accent); align-self: flex-start; border-color: var(--accent); }
        #input-area { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; border-radius: 8px; outline: none; font-size: 16px; }
        button { background: var(--neon); color: #000; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0;">JOHAN v35</h2>
    <div class="panel">
        <span class="panel-label">Neural Link</span>
        <select id="source-selector" onchange="fetchGitHub()">
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt">MAIN CORE</option>
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt">LINGUISTICS</option>
            <option value="https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt">HARDWARE/TECH</option>
        </select>
        <div id="status" style="font-size: 10px; color: var(--neon); margin-top: 5px;">STABLE</div>
    </div>
    <div id="brain-activity" style="font-size: 9px; color: #444; font-family: monospace; overflow: hidden;"></div>
</div>

<div style="flex: 1; display: flex; flex-direction: column;">
    <div id="log"></div>
    <div id="input-area">
        <input type="text" id="user-in" placeholder="Command the AI, King..." onkeypress="if(event.key==='Enter') execute()">
        <button onclick="execute()">FIRE</button>
    </div>
</div>

<script>
    let kb = [];
    let weights = {};

    async function fetchGitHub() {
        const url = document.getElementById('source-selector').value;
        try {
            const res = await fetch(url);
            const text = await res.text();
            kb = text.split(/\r?\n|\. /).filter(s => s.length > 5);
            document.getElementById('status').innerText = "NEURAL SYNCED";
        } catch (e) { document.getElementById('status').innerText = "OFFLINE"; }
    }

    function execute() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        // 1. SELECTIVE RETRIEVAL
        const query = input.toLowerCase().replace(/what is /g, "").trim();
        let matches = kb.filter(s => s.toLowerCase().includes(query));

        if (matches.length > 0) {
            // 2. NEURAL TRAINING (The "NN" Part)
            weights = {}; // Reset brain
            matches.forEach(s => {
                let tokens = s.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(t => t);
                for (let i = 0; i < tokens.length - 1; i++) {
                    if (!weights[tokens[i]]) weights[tokens[i]] = {};
                    weights[tokens[i]][tokens[i+1]] = (weights[tokens[i]][tokens[i+1]] || 0) + 1;
                }
            });

            // 3. PREDICTIVE GENERATION
            let response = generate();
            addLog("Johan", response);
        } else {
            addLog("Johan", "That sequence is not in my weights, King.");
        }
    }

    function generate() {
        let current = Object.keys(weights)[0]; // Start with the first word found
        let res = [current];
        for (let i = 0; i < 50; i++) {
            let nexts = weights[current];
            if (!nexts) break;
            // Pick most frequent next word
            let next = Object.keys(nexts).reduce((a, b) => nexts[a] > nexts[b] ? a : b);
            res.push(next);
            if (".!?".includes(next)) break;
            current = next;
        }
        let output = res.join(" ").replace(/\s+([.!?])/g, "$1");
        return output.charAt(0).toUpperCase() + output.slice(1);
    }

    function addLog(s, t) {
        const l = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        d.innerHTML = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    window.onload = fetchGitHub;
</script>
</body>
</html>
