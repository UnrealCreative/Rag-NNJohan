<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JOHAN v39: Complete Neural Lab</title>
    <style>
        :root { --neon: #00ffcc; --accent: #bb86fc; --bg: #050505; --panel: #111; --red: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ddd; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar: Neural Map & Controls */
        #sidebar { width: 420px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .map-container { flex: 1; overflow-y: auto; background: #000; border: 1px solid #222; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; }
        .node-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; align-items: center; }
        .weight-tag { color: var(--neon); font-weight: bold; }
        .snip-btn { background: var(--red); color: white; border: none; cursor: pointer; padding: 2px 6px; border-radius: 3px; font-size: 9px; }
        
        /* Main: Chat & Evolution */
        #main { flex: 1; display: flex; flex-direction: column; background: #080808; }
        #log { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 10px; max-width: 85%; border: 1px solid #333; line-height: 1.5; }
        .ai { color: var(--accent); align-self: flex-start; border-color: var(--accent); box-shadow: 0 0 10px rgba(187, 134, 252, 0.1); }
        .user { color: var(--neon); align-self: flex-end; border-color: var(--neon); }
        
        /* Feedback System */
        .feedback-bar { margin-top: 10px; display: flex; gap: 8px; }
        .btn-action { font-size: 10px; padding: 4px 10px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; text-transform: uppercase; }
        .reward { border-color: var(--neon); color: var(--neon); }
        .punish { border-color: var(--red); color: var(--red); }

        #input-area { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; background: #111; }
        input { flex: 1; background: #000; border: 1px solid #333; color: var(--neon); padding: 15px; border-radius: 8px; outline: none; font-size: 15px; }
        button#send { background: var(--neon); color: #000; font-weight: bold; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--neon); margin: 0; letter-spacing: 2px;">NEURAL ARCHIVE</h2>
    <div id="stats" style="font-size: 10px; color: #666;">Synchronizing nodes...</div>
    
    <div class="map-container" id="map-view"></div>

    <div class="panel" style="background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333;">
        <span style="font-size: 10px; color: #888; font-weight: bold;">EVOLVE LOGIC (MANUAL INJECT)</span>
        <input type="text" id="evolve-in" placeholder="Type a new truth..." style="width: 100%; box-sizing: border-box; margin-top: 8px; background: #000; border: 1px solid #444; color: var(--neon); padding: 8px;">
        <button class="btn-action" onclick="injectTruth()" style="width: 100%; margin-top: 8px; background: var(--accent); color: white; border: none;">RECODE BRAIN</button>
    </div>
</div>

<div id="main">
    <div id="log"></div>
    <div id="input-area">
        <input type="text" id="user-in" placeholder="Query the system, King..." onkeypress="if(event.key==='Enter') execute()">
        <button id="send" onclick="execute()">EXECUTE</button>
    </div>
</div>

<script>
    let brain = {}; 
    let activePath = [];

    async function sync() {
        const sources = [
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt",
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New.txt",
            "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/New1.txt"
        ];
        for (let url of sources) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                learn(text);
            } catch (e) { console.error("Source Sync Error"); }
        }
        renderMap();
    }

    function learn(text) {
        const sentences = text.split(/\r?\n|\. /);
        sentences.forEach(s => {
            const tokens = s.toLowerCase().replace(/([.!?])/g, " $1 ").split(/\s+/).filter(t => t.length > 0);
            for (let i = 0; i < tokens.length - 1; i++) {
                const a = tokens[i], b = tokens[i+1];
                if (!brain[a]) brain[a] = {};
                brain[a][b] = (brain[a][b] || 1); 
            }
        });
        updateStats();
    }

    function execute() {
        const input = document.getElementById('user-in').value.trim();
        if (!input) return;
        addLog("User", input);
        document.getElementById('user-in').value = "";

        const query = input.toLowerCase().replace(/what is /g, "").trim();
        const seed = Object.keys(brain).find(k => k.includes(query)) || Object.keys(brain)[0];
        
        const response = generate(seed);
        addLog("Johan", response, true);
    }

    function generate(seed) {
        let current = seed;
        let result = [current];
        activePath = [current];

        for (let i = 0; i < 60; i++) {
            let options = brain[current];
            if (!options) break;

            let sorted = Object.keys(options).sort((a, b) => options[b] - options[a]);
            let next = sorted[0];

            // LOOP PREVENTION Logic
            if (result.slice(-4).includes(next) && sorted.length > 1) {
                next = sorted[1]; // Pick alternative path
            }

            result.push(next);
            activePath.push(next);
            if (".!?".includes(next)) break;
            current = next;
        }
        return result.join(" ").replace(/\s+([.!?])/g, "$1").charAt(0).toUpperCase() + result.join(" ").slice(1);
    }

    // --- REWARD / PUNISH SYSTEM ---
    function adjustWeight(amount) {
        for (let i = 0; i < activePath.length - 1; i++) {
            const a = activePath[i], b = activePath[i+1];
            if (brain[a] && brain[a][b] !== undefined) {
                brain[a][b] = Math.max(0, brain[a][b] + amount);
            }
        }
        renderMap();
        addLog("System", `Neural weights adjusted by ${amount}. Path updated.`);
    }

    // --- SNIPPING TOOL ---
    function snip(a, b) {
        if (brain[a] && brain[a][b]) {
            delete brain[a][b];
            renderMap();
            updateStats();
        }
    }

    function injectTruth() {
        const str = document.getElementById('evolve-in').value;
        if (str) {
            learn(str);
            document.getElementById('evolve-in').value = "";
            renderMap();
            addLog("System", "New logic injected into primary core.");
        }
    }

    function renderMap() {
        const view = document.getElementById('map-view');
        view.innerHTML = "";
        const topNodes = Object.keys(brain).slice(0, 60); 
        topNodes.forEach(a => {
            Object.keys(brain[a]).forEach(b => {
                const row = document.createElement('div');
                row.className = "node-row";
                row.innerHTML = `<span>${a} → ${b} <span class="weight-tag">[${brain[a][b]}]</span></span><button class="snip-btn" onclick="snip('${a}','${b}')">SNIP</button>`;
                view.appendChild(row);
            });
        });
    }

    function updateStats() {
        document.getElementById('stats').innerText = `Nodes Active: ${Object.keys(brain).length}`;
    }

    function addLog(s, t, isAI = false) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `msg ${s.toLowerCase()}`;
        let html = `<strong>${s.toUpperCase()}</strong><br>${t}`;
        if (isAI) {
            html += `<div class="feedback-bar">
                <button class="btn-action reward" onclick="adjustWeight(10)">⭐ Reward</button>
                <button class="btn-action punish" onclick="adjustWeight(-10)">💀 Punish</button>
            </div>`;
        }
        d.innerHTML = html;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    window.onload = sync;
</script>
</body>
</html>
